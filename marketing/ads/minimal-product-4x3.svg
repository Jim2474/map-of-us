<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1200" viewBox="0 0 1600 1200">
  <defs>
    <linearGradient id="bg" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="#FAFBF7"/>
      <stop offset="1" stop-color="#F8F2E8"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="24" stdDeviation="24" flood-color="#5A6670" flood-opacity="0.13"/>
    </filter>
    <clipPath id="iconClip">
      <rect x="520" y="150" width="560" height="560" rx="118"/>
    </clipPath>
    <style>
      .font { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif; }
      .kicker { font-size: 30px; font-weight: 720; fill: #D98798; letter-spacing: 0; }
      .title { font-size: 78px; font-weight: 850; fill: #3F4C54; letter-spacing: 0; }
      .body { font-size: 32px; font-weight: 560; fill: #68747B; letter-spacing: 0; }
      .small { font-size: 24px; font-weight: 650; fill: #7A858B; letter-spacing: 0; }
    </style>
  </defs>
  <rect width="1600" height="1200" fill="url(#bg)"/>
  <path d="M214 890 C430 754 602 844 760 742 C902 650 1076 690 1338 516" fill="none" stroke="#E8B8C2" stroke-width="10" stroke-linecap="round" stroke-dasharray="2 32" opacity="0.48"/>
  <circle cx="214" cy="890" r="14" fill="#E8B8C2" opacity="0.72"/>
  <circle cx="760" cy="742" r="14" fill="#E8B8C2" opacity="0.72"/>
  <circle cx="1338" cy="516" r="14" fill="#E8B8C2" opacity="0.72"/>
  <g filter="url(#softShadow)">
    <image href="map-of-us-icon-trimmed.png" x="520" y="150" width="560" height="560" preserveAspectRatio="xMidYMid meet" clip-path="url(#iconClip)"/>
  </g>
  <text class="font kicker" x="0" y="790" text-anchor="middle" transform="translate(800 0)">OPEN SOURCE TEMPLATE</text>
  <text class="font title" x="800" y="878" text-anchor="middle">把回忆放回地图上</text>
  <text class="font body" x="800" y="944" text-anchor="middle">Map of Us · 本地优先的情侣记忆地图</text>
  <text class="font small" x="800" y="1022" text-anchor="middle">Next.js 16 / Electron / 可自定义照片、城市、纪念日</text>
</svg>

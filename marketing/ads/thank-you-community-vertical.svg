<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1440" viewBox="0 0 1080 1440">
  <defs>
    <linearGradient id="bg" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="#F9F6EC"/>
      <stop offset="0.5" stop-color="#FAFBF7"/>
      <stop offset="1" stop-color="#D6E8F0"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="24" stdDeviation="24" flood-color="#5A6670" flood-opacity="0.18"/>
    </filter>
    <style>
      .font { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif; }
      .kicker { font-size: 36px; font-weight: 760; fill: #E08CA0; letter-spacing: 0; }
      .title { font-size: 88px; font-weight: 900; fill: #3F4C54; letter-spacing: 0; }
      .body { font-size: 35px; font-weight: 620; fill: #5A6670; letter-spacing: 0; }
      .note { font-size: 26px; font-weight: 620; fill: #738087; letter-spacing: 0; }
      .chip { font-size: 26px; font-weight: 760; fill: #4B5961; letter-spacing: 0; }
    </style>
  </defs>
  <rect width="1080" height="1440" fill="url(#bg)"/>
  <circle cx="908" cy="160" r="92" fill="#FFE0B8" opacity="0.75"/>
  <path d="M74 308 C206 208 330 326 450 244 C568 164 706 232 816 312 C908 380 980 352 1038 316" fill="none" stroke="#FFFFFF" stroke-width="26" stroke-linecap="round" opacity="0.75"/>
  <text class="font kicker" x="90" y="150">因为很多人说想要</text>
  <text class="font title" x="86" y="268">我把它</text>
  <text class="font title" x="86" y="368">开源了</text>
  <text class="font body" x="90" y="458">一个可以记录城市、照片和故事的</text>
  <text class="font body" x="90" y="508">本地情侣记忆地图模板。</text>
  <g filter="url(#shadow)">
    <rect x="90" y="604" width="900" height="508" rx="42" fill="#FAFBF7"/>
    <rect x="142" y="662" width="256" height="322" rx="24" fill="#F5DCE0"/>
    <rect x="178" y="708" width="184" height="130" rx="18" fill="#FFFFFF" opacity="0.78"/>
    <rect x="178" y="858" width="152" height="20" rx="10" fill="#E8B8C2"/>
    <rect x="178" y="896" width="190" height="20" rx="10" fill="#D8DDD8"/>
    <path d="M464 928 C560 842 546 706 660 720 C752 730 742 842 834 850 C902 856 902 948 830 988 L520 1010 C454 1006 416 968 464 928 Z" fill="#D6E8F0"/>
    <path d="M508 906 C592 852 618 800 682 812 C746 824 748 888 812 890 C856 892 858 944 812 962 L552 980 C500 976 468 936 508 906 Z" fill="#A8C8DC" opacity="0.62"/>
    <path d="M530 900 C610 848 664 858 714 820 C762 784 824 818 856 872" fill="none" stroke="#E8B8C2" stroke-width="12" stroke-linecap="round" stroke-dasharray="2 28"/>
    <circle cx="530" cy="900" r="15" fill="#E8B8C2"/>
    <circle cx="714" cy="820" r="15" fill="#E8B8C2"/>
    <circle cx="856" cy="872" r="15" fill="#E8B8C2"/>
  </g>
  <g transform="translate(90 1184)">
    <rect width="236" height="64" rx="32" fill="#FFFFFF" opacity="0.9"/>
    <text class="font chip" x="34" y="41">本地保存数据</text>
  </g>
  <g transform="translate(350 1184)">
    <rect width="238" height="64" rx="32" fill="#FFFFFF" opacity="0.72"/>
    <text class="font chip" x="34" y="41">可打包桌面端</text>
  </g>
  <g transform="translate(612 1184)">
    <rect width="280" height="64" rx="32" fill="#FFFFFF" opacity="0.72"/>
    <text class="font chip" x="34" y="41">改成你的故事</text>
  </g>
  <text class="font note" x="90" y="1324">GitHub 已开源：去主页/评论区拿源码</text>
  <text class="font note" x="90" y="1364">Map of Us · for every private little universe</text>
</svg>

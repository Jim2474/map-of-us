<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1200" viewBox="0 0 1600 1200">
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0" stop-color="#F8F2E8"/>
      <stop offset="1" stop-color="#FAFBF7"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="28" stdDeviation="26" flood-color="#5A6670" flood-opacity="0.14"/>
    </filter>
    <clipPath id="iconClip">
      <rect x="904" y="214" width="470" height="470" rx="98"/>
    </clipPath>
    <style>
      .font { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif; }
      .mono { font-family: "SFMono-Regular", Consolas, monospace; }
      .title { font-size: 74px; font-weight: 850; fill: #3F4C54; letter-spacing: 0; }
      .body { font-size: 32px; font-weight: 560; fill: #68747B; letter-spacing: 0; }
      .code { font-size: 28px; fill: #FAFBF7; }
      .small { font-size: 24px; font-weight: 650; fill: #7A858B; letter-spacing: 0; }
    </style>
  </defs>
  <rect width="1600" height="1200" fill="url(#bg)"/>
  <g filter="url(#softShadow)">
    <image href="map-of-us-icon-trimmed.png" x="904" y="214" width="470" height="470" preserveAspectRatio="xMidYMid meet" clip-path="url(#iconClip)"/>
  </g>
  <text class="font title" x="170" y="288">开源一个</text>
  <text class="font title" x="170" y="382">私人记忆地图模板</text>
  <text class="font body" x="174" y="480">适合改成情侣地图、旅行足迹、家庭相册。</text>
  <text class="font body" x="174" y="536">数据本地保存，也能打包成桌面应用。</text>
  <g transform="translate(174 654)" filter="url(#softShadow)">
    <rect width="560" height="232" rx="26" fill="#3F4C54"/>
    <circle cx="44" cy="48" r="8" fill="#E8B8C2"/>
    <circle cx="76" cy="48" r="8" fill="#FFE0B8"/>
    <circle cx="108" cy="48" r="8" fill="#A8C89A"/>
    <text class="mono code" x="48" y="110">npm install</text>
    <text class="mono code" x="48" y="158">npm run dev</text>
    <text class="mono code" x="48" y="206">npm run dist:mac</text>
  </g>
  <text class="font small" x="930" y="790">Map of Us 已开源</text>
  <text class="font small" x="930" y="834">GitHub 自取，改成你的故事。</text>
</svg>

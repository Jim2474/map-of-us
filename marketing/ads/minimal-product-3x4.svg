<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="1600" viewBox="0 0 1200 1600">
  <defs>
    <linearGradient id="bg" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="#FAFBF7"/>
      <stop offset="1" stop-color="#F8F2E8"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="24" stdDeviation="24" flood-color="#5A6670" flood-opacity="0.13"/>
    </filter>
    <clipPath id="iconClip">
      <rect x="265" y="170" width="670" height="670" rx="142"/>
    </clipPath>
    <style>
      .font { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif; }
      .kicker { font-size: 30px; font-weight: 720; fill: #D98798; letter-spacing: 0; }
      .title { font-size: 76px; font-weight: 850; fill: #3F4C54; letter-spacing: 0; }
      .body { font-size: 34px; font-weight: 560; fill: #68747B; letter-spacing: 0; }
      .small { font-size: 26px; font-weight: 650; fill: #7A858B; letter-spacing: 0; }
    </style>
  </defs>
  <rect width="1200" height="1600" fill="url(#bg)"/>
  <path d="M108 1196 C292 1060 446 1120 592 1018 C734 920 884 956 1082 804" fill="none" stroke="#E8B8C2" stroke-width="10" stroke-linecap="round" stroke-dasharray="2 32" opacity="0.46"/>
  <circle cx="108" cy="1196" r="14" fill="#E8B8C2" opacity="0.72"/>
  <circle cx="592" cy="1018" r="14" fill="#E8B8C2" opacity="0.72"/>
  <circle cx="1082" cy="804" r="14" fill="#E8B8C2" opacity="0.72"/>
  <g filter="url(#softShadow)">
    <image href="map-of-us-icon-trimmed.png" x="265" y="170" width="670" height="670" preserveAspectRatio="xMidYMid meet" clip-path="url(#iconClip)"/>
  </g>
  <text class="font kicker" x="600" y="982" text-anchor="middle">OPEN SOURCE TEMPLATE</text>
  <text class="font title" x="600" y="1078" text-anchor="middle">把回忆放回地图上</text>
  <text class="font body" x="600" y="1160" text-anchor="middle">Map of Us · 本地优先的情侣记忆地图</text>
  <text class="font small" x="600" y="1252" text-anchor="middle">Next.js 16 / Electron / 可自定义照片、城市、纪念日</text>
</svg>

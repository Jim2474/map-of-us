<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1200" viewBox="0 0 1600 1200">
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#FAFBF7"/>
      <stop offset="1" stop-color="#F6EFE3"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="28" stdDeviation="28" flood-color="#5A6670" flood-opacity="0.14"/>
    </filter>
    <clipPath id="iconClip">
      <rect x="162" y="270" width="620" height="620" rx="128"/>
    </clipPath>
    <style>
      .font { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif; }
      .brand { font-size: 92px; font-weight: 850; fill: #3F4C54; letter-spacing: 0; }
      .title { font-size: 62px; font-weight: 760; fill: #3F4C54; letter-spacing: 0; }
      .body { font-size: 34px; font-weight: 560; fill: #68747B; letter-spacing: 0; }
      .chip { font-size: 26px; font-weight: 700; fill: #58656C; letter-spacing: 0; }
    </style>
  </defs>
  <rect width="1600" height="1200" fill="url(#bg)"/>
  <circle cx="1350" cy="190" r="130" fill="#FFE0B8" opacity="0.36"/>
  <circle cx="118" cy="1028" r="220" fill="#D6E8F0" opacity="0.34"/>
  <g filter="url(#softShadow)">
    <image href="map-of-us-icon-trimmed.png" x="162" y="270" width="620" height="620" preserveAspectRatio="xMidYMid meet" clip-path="url(#iconClip)"/>
  </g>
  <text class="font brand" x="842" y="420">Map of Us</text>
  <text class="font title" x="846" y="518">已开源</text>
  <text class="font body" x="850" y="604">一个本地优先的情侣记忆地图模板。</text>
  <text class="font body" x="850" y="660">把城市、照片和故事，放进你自己的地图里。</text>
  <g transform="translate(850 742)">
    <rect width="184" height="58" rx="29" fill="#FFFFFF" opacity="0.82"/>
    <text class="font chip" x="30" y="38">GitHub 自取</text>
  </g>
  <g transform="translate(1056 742)">
    <rect width="192" height="58" rx="29" fill="#FFFFFF" opacity="0.58"/>
    <text class="font chip" x="30" y="38">Local-first</text>
  </g>
</svg>

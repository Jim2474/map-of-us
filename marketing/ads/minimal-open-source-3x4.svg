<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="1600" viewBox="0 0 1200 1600">
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#FAFBF7"/>
      <stop offset="1" stop-color="#F6EFE3"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="28" stdDeviation="28" flood-color="#5A6670" flood-opacity="0.14"/>
    </filter>
    <clipPath id="iconClip">
      <rect x="230" y="188" width="740" height="740" rx="156"/>
    </clipPath>
    <style>
      .font { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif; }
      .brand { font-size: 94px; font-weight: 850; fill: #3F4C54; letter-spacing: 0; }
      .title { font-size: 66px; font-weight: 760; fill: #3F4C54; letter-spacing: 0; }
      .body { font-size: 36px; font-weight: 560; fill: #68747B; letter-spacing: 0; }
      .chip { font-size: 28px; font-weight: 700; fill: #58656C; letter-spacing: 0; }
    </style>
  </defs>
  <rect width="1200" height="1600" fill="url(#bg)"/>
  <circle cx="1018" cy="188" r="112" fill="#FFE0B8" opacity="0.34"/>
  <circle cx="92" cy="1466" r="204" fill="#D6E8F0" opacity="0.34"/>
  <g filter="url(#softShadow)">
    <image href="map-of-us-icon-trimmed.png" x="230" y="188" width="740" height="740" preserveAspectRatio="xMidYMid meet" clip-path="url(#iconClip)"/>
  </g>
  <text class="font brand" x="600" y="1060" text-anchor="middle">Map of Us</text>
  <text class="font title" x="600" y="1150" text-anchor="middle">已开源</text>
  <text class="font body" x="600" y="1246" text-anchor="middle">一个本地优先的情侣记忆地图模板。</text>
  <text class="font body" x="600" y="1304" text-anchor="middle">把城市、照片和故事放进自己的地图里。</text>
  <g transform="translate(348 1392)">
    <rect width="212" height="64" rx="32" fill="#FFFFFF" opacity="0.82"/>
    <text class="font chip" x="34" y="42">GitHub 自取</text>
  </g>
  <g transform="translate(590 1392)">
    <rect width="210" height="64" rx="32" fill="#FFFFFF" opacity="0.58"/>
    <text class="font chip" x="36" y="42">Local-first</text>
  </g>
</svg>

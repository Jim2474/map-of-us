<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="1600" viewBox="0 0 1200 1600">
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#F8F2E8"/>
      <stop offset="1" stop-color="#FAFBF7"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="28" stdDeviation="26" flood-color="#5A6670" flood-opacity="0.14"/>
    </filter>
    <clipPath id="iconClip">
      <rect x="360" y="132" width="480" height="480" rx="102"/>
    </clipPath>
    <style>
      .font { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif; }
      .mono { font-family: "SFMono-Regular", Consolas, monospace; }
      .title { font-size: 70px; font-weight: 850; fill: #3F4C54; letter-spacing: 0; }
      .body { font-size: 34px; font-weight: 560; fill: #68747B; letter-spacing: 0; }
      .code { font-size: 30px; fill: #FAFBF7; }
      .small { font-size: 28px; font-weight: 650; fill: #7A858B; letter-spacing: 0; }
    </style>
  </defs>
  <rect width="1200" height="1600" fill="url(#bg)"/>
  <g filter="url(#softShadow)">
    <image href="map-of-us-icon-trimmed.png" x="360" y="132" width="480" height="480" preserveAspectRatio="xMidYMid meet" clip-path="url(#iconClip)"/>
  </g>
  <text class="font title" x="600" y="760" text-anchor="middle">开源一个</text>
  <text class="font title" x="600" y="850" text-anchor="middle">私人记忆地图模板</text>
  <text class="font body" x="600" y="952" text-anchor="middle">适合改成情侣地图、旅行足迹、家庭相册。</text>
  <text class="font body" x="600" y="1012" text-anchor="middle">数据本地保存，也能打包成桌面应用。</text>
  <g transform="translate(260 1110)" filter="url(#softShadow)">
    <rect width="680" height="260" rx="28" fill="#3F4C54"/>
    <circle cx="48" cy="52" r="8" fill="#E8B8C2"/>
    <circle cx="82" cy="52" r="8" fill="#FFE0B8"/>
    <circle cx="116" cy="52" r="8" fill="#A8C89A"/>
    <text class="mono code" x="58" y="120">npm install</text>
    <text class="mono code" x="58" y="176">npm run dev</text>
    <text class="mono code" x="58" y="232">npm run dist:mac</text>
  </g>
  <text class="font small" x="600" y="1464" text-anchor="middle">Map of Us 已开源 · GitHub 自取</text>
</svg>
